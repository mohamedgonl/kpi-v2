<div class="app-shell">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon-box">
        <i class="pi pi-chart-line" style="font-size: 20px; color: #fff;"></i>
      </div>
      <div class="logo-info">
        <div class="logo-text">KPI MANAGER</div>
        <div class="logo-sub">DASHBOARD & REPORTS</div>
      </div>
    </div>

    <div class="sidebar-section">Nghiệp vụ</div>
    <ng-container *ngFor="let item of mainNav">
      <a *ngIf="canSeeNav(item)" [routerLink]="item.route" routerLinkActive="active" class="nav-item">
        <i class="nav-icon pi {{item.icon}}"></i>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </ng-container>

    <ng-container *ngIf="auth.hasRole('admin')">
      <div class="sidebar-section">Quản trị</div>
      <a *ngFor="let item of adminNav" [routerLink]="item.route" routerLinkActive="active" class="nav-item">
        <i class="nav-icon pi {{item.icon}}"></i>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </ng-container>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar">{{ userInitials }}</div>
        <div class="user-info-box">
          <div class="user-name">{{ auth.currentUser?.full_name }}</div>
          <div class="user-role">{{ roleLabel }}</div>
        </div>
        <button class="btn btn-sm btn-logout" (click)="auth.logout()">
          <i class="pi pi-sign-out"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <div class="main-content">
    <router-outlet />
  </div>

  <p-toast position="top-right"></p-toast>
</div>
