<div class="auth-page">
  <div class="auth-card animated fadeIn">
    <div class="auth-header">
      <div class="center-icon-box">
        <i class="pi pi-shield"></i>
      </div>
      <h1 class="auth-title">KPI DASHBOARD</h1>
      <p class="auth-subtitle">Hệ thống quản lý hiệu suất đơn vị</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label" for="email">Tài khoản / Email</label>
        <input id="email" type="email" class="form-input" formControlName="email"
          placeholder="admin@system.com" autocomplete="email" />
        <div class="form-error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched" style="color:red; font-size:11px; margin-top:4px;">
          Vui lòng nhập đúng định dạng email
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Mật khẩu</label>
        <input id="password" type="password" class="form-input" formControlName="password"
          placeholder="••••••" autocomplete="current-password" />
        <div class="form-error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched" style="color:red; font-size:11px; margin-top:4px;">
          Mật khẩu tối thiểu 6 ký tự
        </div>
      </div>

      <div style="text-align:right; margin-bottom:20px; font-size:13px;">
        <a routerLink="/forgot-password" style="color:var(--color-accent); font-weight:500;">Quên mật khẩu?</a>
      </div>

      <div class="form-error" style="margin-bottom:12px; text-align:center; color:red; font-size:13px;" *ngIf="errorMsg">
        {{ errorMsg }}
      </div>

      <button id="btn-login" type="submit" class="btn btn-primary" style="width:100%; font-weight:700; letter-spacing: 0.05em;" [disabled]="loading">
        <i class="pi pi-spin pi-spinner" *ngIf="loading"></i>
        {{ loading ? 'Đang xử lý...' : 'ĐĂNG NHẬP' }}
      </button>
    </form>
  </div>
</div>
