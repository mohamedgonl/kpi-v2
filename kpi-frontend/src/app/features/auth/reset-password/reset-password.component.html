<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">K</div>
      <div><div class="auth-title">Đặt lại mật khẩu</div></div>
    </div>

    <div *ngIf="!done">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="form-label">Mật khẩu mới</label>
          <input type="password" class="form-input" formControlName="newPassword" placeholder="Ít nhất 6 ký tự" />
          <div class="form-error" *ngIf="form.get('newPassword')?.invalid && form.get('newPassword')?.touched">Tối thiểu 6 ký tự</div>
        </div>
        <div class="form-error" style="margin-bottom:12px;text-align:center;" *ngIf="errorMsg">{{ errorMsg }}</div>
        <button type="submit" class="btn btn-primary btn-lg" [disabled]="loading">
          {{ loading ? 'Đang cập nhật...' : 'Xác nhận đổi mật khẩu' }}
        </button>
      </form>
    </div>

    <div *ngIf="done" style="text-align:center;padding:16px 0;">
      <i class="pi pi-check-circle" style="font-size:48px;color:var(--color-success);"></i>
      <p style="margin-top:12px;">Mật khẩu đã được cập nhật thành công!</p>
      <a routerLink="/login" style="margin-top:12px;display:inline-block;" class="btn btn-primary">Đăng nhập ngay</a>
    </div>
  </div>
</div>
