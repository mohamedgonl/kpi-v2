<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div><div class="auth-title">Quên mật khẩu</div></div>
    </div>
    <p class="auth-subtitle">Nhập email để nhận hướng dẫn khôi phục mật khẩu</p>

    <div *ngIf="!sent">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="form-label" for="fp-email">Email</label>
          <input id="fp-email" type="email" class="form-input" formControlName="email"
            placeholder="email@example.com" />
        </div>
        <div class="form-error" style="margin-bottom:12px;text-align:center;" *ngIf="errorMsg">{{ errorMsg }}</div>
        <button id="btn-forgot" type="submit" class="btn btn-primary btn-lg" [disabled]="loading">
          {{ loading ? 'Đang gửi...' : 'Gửi yêu cầu' }}
        </button>
      </form>
    </div>

    <div *ngIf="sent" style="text-align:center;padding:16px 0;">
      <i class="pi pi-check-circle" style="font-size:48px;color:var(--color-success);"></i>
      <p style="margin-top:12px;color:var(--color-muted);">Nếu email tồn tại trong hệ thống, hướng dẫn sẽ được gửi đến bạn trong vài phút.</p>
    </div>

    <div style="text-align:center;margin-top:20px;">
      <a routerLink="/login" style="font-size:13px;">← Quay lại đăng nhập</a>
    </div>
  </div>
</div>
