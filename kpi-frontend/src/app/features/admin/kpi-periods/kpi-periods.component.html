<div class="topbar">
  <div class="topbar-title">Quản lý Kỳ đánh giá KPI</div>
  <div class="topbar-actions">
    <button class="btn btn-primary btn-sm" (click)="addNew()">
      <i class="pi pi-calendar-plus"></i> Thiết lập kỳ mới
    </button>
  </div>
</div>

<div class="page-content">
  <div class="card">
    <div class="card-header">
      <div class="card-title">Danh sách các kỳ đánh giá</div>
    </div>

    <div class="table-responsive" style="overflow-x:auto;">
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:180px;">Tên kỳ</th>
            <th style="width:100px;">Loại</th>
            <th>Thời gian áp dụng</th>
            <th style="width:120px;text-align:center;">Trạng thái</th>
            <th style="width:120px;text-align:center;">Khóa sổ</th>
            <th style="width:150px;text-align:right;">Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of periods" [style.background]="p.is_active ? '#f0f9ff' : 'transparent'">
            <td>
              <div style="display:flex;align-items:center;gap:8px;">
                 <i *ngIf="p.is_active" class="pi pi-star-fill" style="color:var(--color-warning);font-size:12px;"></i>
                 <strong>{{ p.name }}</strong>
              </div>
            </td>
            <td>
              <span class="chip chip-info" style="font-size:10px;">{{ p.period_type === 'month' ? 'THÁNG' : 'QUÝ' }}</span>
            </td>
            <td>
              <div style="font-size:13px;">{{ p.start_date | date:'dd/MM/yyyy' }} &rarr; {{ p.end_date | date:'dd/MM/yyyy' }}</div>
            </td>
            <td style="text-align:center;">
              <span *ngIf="p.is_active" class="chip chip-success">HIỆN TẠI</span>
              <span *ngIf="!p.is_active" class="chip chip-neutral" style="cursor:pointer;" (click)="setActive(p.id)">Kích hoạt</span>
            </td>
            <td style="text-align:center;">
              <i *ngIf="p.is_locked" class="pi pi-lock" style="color:var(--color-danger);cursor:pointer;" (click)="toggleLock(p)"></i>
              <i *ngIf="!p.is_locked" class="pi pi-lock-open" style="color:var(--color-success);cursor:pointer;" (click)="toggleLock(p)"></i>
            </td>
            <td style="text-align:right;">
               <button class="btn btn-sm btn-outline" style="padding:6px;color:var(--color-primary);" [disabled]="p.is_active" (click)="setActive(p.id)">
                 Đặt làm hiện tại
               </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- New Period Dialog -->
<p-dialog header="Thiết lập Kỳ đánh giá KPI" 
          [(visible)]="showForm" 
          [modal]="true" 
          [style]="{width: '500px'}" 
          [draggable]="false" [resizable]="false">
  
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-fluid">
    <div class="form-group">
      <label class="form-label">Tên kỳ đánh giá <span class="text-danger">*</span></label>
      <input type="text" formControlName="name" class="form-input" placeholder="Ví dụ: Tháng 04/2026">
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="form-group">
        <label class="form-label">Loại kỳ <span class="text-danger">*</span></label>
        <select formControlName="period_type" class="form-input">
          <option value="month">Theo Tháng</option>
          <option value="quarter">Theo Quý</option>
          <option value="year">Theo Năm</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Năm <span class="text-danger">*</span></label>
        <input type="number" formControlName="year" class="form-input">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="form-group">
        <label class="form-label">Ngày bắt đầu</label>
        <p-calendar formControlName="start_date" dateFormat="dd/mm/yy" [showIcon]="true" placeholder="dd/mm/yyyy"></p-calendar>
      </div>
      <div class="form-group">
        <label class="form-label">Ngày kết thúc</label>
        <p-calendar formControlName="end_date" dateFormat="dd/mm/yy" [showIcon]="true" placeholder="dd/mm/yyyy"></p-calendar>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:24px;border-top:1px solid var(--color-border);padding-top:20px;">
      <button type="button" class="btn btn-outline" (click)="showForm = false">Bỏ qua</button>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        <i class="pi pi-check" *ngIf="!loading"></i>
        <i class="pi pi-spin pi-spinner" *ngIf="loading"></i>
        Lưu thiết lập
      </button>
    </div>
  </form>
</p-dialog>
