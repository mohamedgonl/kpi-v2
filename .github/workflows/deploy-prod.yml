# h:\Company\kpi\.github\workflows\deploy-prod.yml
name: Deploy TEST (Test Branch)
on:
  push:
    branches: [prod]

jobs:
  deploy-frontend:
    name: Frontend → Vercel (Production)
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: kpi-v2-prod
    defaults:
      run:
        working-directory: kpi-frontend
    steps:
      - uses: actions/checkout@v4
      
      # Thêm lại bước này để đảm bảo build Angular chuẩn
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kpi-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (Production)
        run: npm run build -- --configuration production
        env:
          BACKEND_API_URL: ${{ vars.BACKEND_API_URL }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ vars.VERCEL_PROJECT_ID_FRONTEND }}
          vercel-args: '--prod'
          working-directory: kpi-frontend
