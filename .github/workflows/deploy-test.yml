name: Deploy TEST (Test Branch)

on:
  push:
    branches: [test]

jobs:
  deploy-backend:
    name: Backend → Vercel (Test)
    runs-on: ubuntu-latest
    environment: kpi-v2-test # <--- Kết nối với môi trường Test bạn vừa tạo
    defaults:
      run:
        working-directory: kpi-backend

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kpi-backend/package-lock.json

      - name: Deploy to Vercel
        run: npx vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes --env SMTP_HOST="${{ vars.SMTP_HOST }}" --env SMTP_PORT="${{ vars.SMTP_PORT }}" --env SMTP_USER="${{ secrets.SMTP_USER }}" --env SMTP_PASS="${{ secrets.SMTP_PASS }}" --env SMTP_FROM="${{ vars.SMTP_FROM }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_BACKEND }}


  deploy-frontend:
    name: Frontend → Vercel (Test)
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: kpi-v2-test
    defaults:
      run:
        working-directory: kpi-frontend

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kpi-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (Test)
        run: npm run build -- --configuration test
        env:
          BACKEND_API_URL: ${{ vars.BACKEND_API_URL }} # Tự động tiêm URL backend test vào build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ vars.VERCEL_PROJECT_ID_FRONTEND }}
          vercel-args: '--prod'
          working-directory: ./
